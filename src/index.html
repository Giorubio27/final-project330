<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UFC Fight Companion | Home</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/main.js" type="module"></script>

</head>

<body>
  <header class="divider header">
    <div class="logo">
      <img src="/images/theoctagonlognew.webp" alt="UFC image for logo" />
      <a href="index.html"> UFC<span class="highlight"> Fight Companion</span></a>
    </div>
    <div class="memberships">
      <a href="/membership/index.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="30">
          <path fill="red" d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8z" />
        </svg>
      </a>
    </div>
  </header>
  <main class="divider">
    <div class="hero">
      <img src="/images/octagonhero.webp" alt="UFC">



    </div>
    <section class="fighter-search">
      <h2>Find a fighter</h2>
      <div class="search-bar">
        <input type="text" id="fighter-search-input" placeholder="Enter Fighter Name Here (e.g Jon Jones)...">
        <button id="searchButton">Search</button>
      </div>
    </section>

    <section class="fighters">
      <h2>Top Fighters</h2>
      <ul class="fighter-list">
        <li class="fighter-card">
          <a href="#">
            <img src="/images/ufc-fighter-placeholder.webp" alt="ufc fighter" />
            <h3 class="fighter-rank"></h3>
            <h2 class="fighter__name"></h2>
            <p class="fighter-record"></p>
          </a>
        </li>
        <li class="fighter-card">
          <a href="#">
            <img src="/images/ufc-fighter-placeholder.webp" alt="ufc fighter" />
            <h3 class="fighter-rank"></h3>
            <h2 class="fighter__name"></h2>
            <p class="fighter-record"></p>
          </a>
        </li>
        <li class="fighter-card">
          <a href="#">
            <img src="/images/ufc-fighter-placeholder.webp" alt="ufc fighter" />
            <h3 class="fighter-rank"></h3>
            <h2 class="fighter__name"></h2>
            <p class="fighter-record"></p>
          </a>
        </li>
        <li class="fighter-card">
          <a href="#">
            <img src="/images/ufc-fighter-placeholder.webp" alt="ufc fighter" />
            <h3 class="fighter-rank"></h3>
            <h2 class="fighter__name"></h2>
            <p class="fighter-record"></p>
          </a>
        </li>
      </ul>
    </section>
    <section class="fighters">
      <h2>Upcoming Events</h2>
      <ul class="events-list">
        <li class="fight-card">
          <a href="event_pages/">
            <img src="/images/ufc-fighter-placeholder.webp" alt="ufc fighter" />

            <h2 class="event__name"></h2>
            <h3 class="event-date"></h3>
            <p class="event-venue"></p>
          </a>
        </li>
        <li class="fight-card">
          <a href="event_pages/">
            <img src="/images/ufc-fighter-placeholder.webp" alt="ufc fighter" />

            <h2 class="event__name"></h2>
            <h3 class="event-date"></h3>
            <p class="event-venue"></p>
          </a>
        </li>
        <li class="fight-card">
          <a href="event_pages/">
            <img src="/images/ufc-fighter-placeholder.webp" alt="ufc fighter" />

            <h2 class="event__name"></h2>
            <h3 class="event-date"></h3>
            <p class="event-venue"></p>
          </a>
        </li>
        <li class="fight-card">
          <a href="event_pages/">
            <img src="/images/ufc-fighter-placeholder.webp" alt="ufc fighter" />

            <h2 class="event__name"></h2>
            <h3 class="event-date"></h3>
            <p class="event-venue"></p>
          </a>
        </li>
      </ul>
    </section>
  </main>
  <footer>
    &copy;2026 🥷🏼 Fight Companion 🥷🏼 Zuffa 🥷🏼 Ultimate Fighting Championship
  </footer>
</body>
